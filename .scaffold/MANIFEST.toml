# .scaffold/MANIFEST.toml
# Machine-readable metadata. The AI's config file.
# Everything in the scaffolding reads this first.

[project]
name = "Terragraf"
type = "scaffolding"        # This IS the AI's src folder
cli = "terra"               # Single entry point: ./terra help
license = "Apache-2.0"

[platforms]
linux_wayland = true        # Linux with Wayland compositor
windows_10 = true           # Windows 10
windows_11 = true           # Windows 11
# No mobile. No macOS. Desktop only.

[scaffolding]
version = "0.1.0"
entry = "ENTRY.md"

# Feature flags — what subsystems are active
[features]
git = true                  # Git/GitHub workflows
ml = true                   # PyTorch ML pipeline
fft = true                  # FFT/spectral analysis
vulkan = true               # Vulkan compute/graphics
shaders = true              # GPU shader pipeline
ci = true                   # CI/CD workflows
instances = true            # Multi-instancing (replaces agents)
math = true                 # Math & algebra primitives
viz = true                  # Visualization (2D + 3D)
imgui = true                # ImGui real-time math modeling
sharpen = true              # Self-sharpening routes and tables
tuning = true               # Thematic tension calibration

# Languages the scaffolding supports
[languages]
python = true               # Generators, ML, FFT
javascript = true           # Generators, resolve, tooling
cpp = true                  # Vulkan, FFT, native compute
rust = false                # Optional future support
kotlin = false              # Disabled (not Android anymore)

# Runtimes available on host
[runtimes]
shell = true                # Always available (bash/sh)
powershell = false          # Windows — set true on Win hosts
node = false                # For JS generators
python = false              # For PY generators/ML
cmake = false               # For C++ builds
cuda = false                # For GPU compute

# Global variables available to all templates via {{var_name}}
[vars]
# Fill per-instance. Examples:
# python_version = "3.11"
# cuda_arch = "sm_86"
# vulkan_api = "1.3"

# Git configuration
[git]
default_branch = "main"
branch_prefix = ""
commit_style = "conventional"
pr_template = "git/templates/pull_request.md"
issue_template = "git/templates/issue.md"
remote = "origin"

# ML configuration
[ml]
framework = "pytorch"
python_version = "3.11"
cuda_version = "12.1"
default_device = "auto"     # "auto", "cpu", "cuda"
checkpoint_dir = "checkpoints/"
data_dir = "data/"
log_dir = "runs/"

# Compute configuration
[compute]
vulkan_api = "1.3"
fft_backend = "numpy"       # "numpy", "scipy", "fftw", "cufft", "vulkan"
shader_lang = "glsl"        # "glsl", "hlsl", "wgsl"

# Operational mode configuration (CI vs App)
[modes]
detection = "auto"              # "auto", "ci", "app" — override via TERRAGRAF_MODE env var
ci_blocked = [                  # Systems blocked in CI mode
    "gui", "qt_app", "imgui", "bridge",
    "viz_interactive", "vulkan",
    "tuning_ui", "settings_ui",
]
ci_allowed = [                  # Systems allowed in CI mode
    "tests", "lint", "syntax_check", "generators",
    "routes", "tables", "sharpen", "math",
    "queue", "hooks",
]

# Multi-instancing configuration (replaces traditional agents)
[instances]
max_concurrent = 4          # Max parallel AI instances
shared_state = ".scaffold/instances/shared/"
instance_dir = ".scaffold/instances/"
ipc = "auto"                # "auto", "socket", "filesystem"
# Each instance gets its own working context but shares
# the scaffolding structure, headers, routes, and tables.
# Instances communicate via the shared state directory.

# HOT_CONTEXT lifecycle management
[hot_context]
max_lines = 80              # Warning threshold for HOT_CONTEXT.md line count
auto_decompose_on_commit = true   # Run decompose automatically on commit
retain_sessions = 3         # Keep N most recent sessions verbatim; older sessions archive to KNOWLEDGE.toml
hard_max_lines = 1000       # Absolute ceiling — forcer extracts h3 sub-sections until under this
