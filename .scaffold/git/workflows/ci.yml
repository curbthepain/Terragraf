# .scaffold/git/workflows/ci.yml
# Standard CI workflow template. Copy to .github/workflows/ and customize.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Language-specific setup ──────────────────────────────────
      # Uncomment the section matching your project's language.

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy scipy pytest

      # ─── Test ─────────────────────────────────────────────────────
      - name: Run tests
        working-directory: .scaffold
        run: python -m pytest tests/ -v --tb=short

      # ─── Lint ─────────────────────────────────────────────────────
      - name: Check syntax
        working-directory: .scaffold
        run: python -m py_compile compute/math/linalg.py compute/math/algebra.py compute/math/stats.py compute/math/transforms.py compute/fft/fft.py compute/fft/spectral.py
