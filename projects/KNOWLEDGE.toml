[[knowledge]]
id = "pydub-fallback"
source = "music-viz"
category = "caveat"
summary = "pydub requires ffmpeg system binary for MP3 decode"
detail = "pydub wraps ffmpeg/avconv. If neither is on PATH, AudioSegment.from_mp3() raises FileNotFoundError. Fallback: use soundfile for WAV-only mode."
