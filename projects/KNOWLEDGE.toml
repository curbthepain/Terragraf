[[knowledge]]
id = "decisions-made-session-19-session-19"
source = "hot-context-decompose"
category = "decision"
summary = """Decisions Made (Session 19) (Session 19)"""
detail = """- **Streaming architecture**: chunks flow through `self._emit_chunk` (a per-run
  bound callable) so the same `run()` body works in sync (direct append) and
  async (Qt signal emit auto-marshals to GUI thread). Avoids subclasses needing
  to know which mode they're in. Trailing return value is only used if no chunks
  arrived — prevents the final dump clobbering streamed lines.
- **`python -u` in run_skill_stream**: critical for line-by-line behavior;
  without it Python buffers stdout when redi"""
tags = ["hot-context", "session-19", "archived", "hard-cap"]
created = "2026-04-06"

